name: Regenerate org detail pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "regenerate-pages"
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate org detail pages + sitemap
        run: node generate-org-pages.js

      - name: Generate eval landing page
        run: node generate-eval-page.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add orgs/ eval/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-regenerate detail pages from data-orgs.js"
            git push
          fi
